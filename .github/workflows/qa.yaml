name: QA

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]

permissions:
    contents: read

jobs:
    build-twitch-api-and-run-functionals:
        runs-on: ubuntu-latest

        steps:
            -   uses: actions/checkout@v3

            -   uses: shivammathur/setup-php@v2
                with:
                    php-version: '8.4'

            -   name: Install Dependencies
                run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
                shell: bash

            -   name: Execute tests (Unit and Functional tests) via PHPUnit
                run: vendor/bin/phpunit

            -   name: Upload coverage reports to Codecov
                uses: codecov/codecov-action@v3
                env:
                    CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

    run-phpstan:
        runs-on: ubuntu-latest

        steps:
            -   uses: actions/checkout@v3

            -   uses: shivammathur/setup-php@v2
                with:
                    php-version: '8.4'

            -   name: Install Dependencies
                run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
                shell: bash

            -   name: PHPStan code analysis
                run: vendor/bin/phpstan analyse

    run-php-cs-fixer:
        runs-on: ubuntu-latest

        steps:
            -   uses: actions/checkout@v3

            -   uses: shivammathur/setup-php@v2
                with:
                    php-version: '8.4'

            -   name: Install Dependencies
                run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
                shell: bash

            -   name: Check for PHP codestyle compliance
                run: vendor/bin/php-cs-fixer check --allow-risky=yes
